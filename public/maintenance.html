<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - winstall</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main-bg: #fff;
            --textColor: #333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --main-bg: rgb(18, 18, 18);
                --textColor: rgb(255, 255, 255);
            }
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: var(--main-bg);
            color: var(--textColor);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .icon {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
            user-select: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.85;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.1rem;
            }

            .icon {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/assets/clippy.png" alt="Clippy" class="icon" draggable="false">
        <h1>We'll be right back!</h1>
        <h3>winstall is currently undergoing scheduled maintenance to improve your experience.</h3>
    </div>
</body>
</html>
